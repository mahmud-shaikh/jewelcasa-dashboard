name: Fetch DoubleTick Data

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger button in GitHub

permissions:
  contents: write          # Required to push dt_data.json back to repo

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch DoubleTick chat list
        run: |
          curl -s \
            -H "Authorization: ${{ secrets.DT_KEY }}" \
            -H "Content-Type: application/json" \
            "https://public.doubletick.io/whatsapp/chat/list?wabaNumber=%2B917738264158&limit=100" \
            -o dt_chats_raw.json
          echo "Chat list fetched"
          cat dt_chats_raw.json | head -c 200

      - name: Fetch DoubleTick broadcast groups
        run: |
          curl -s \
            -H "Authorization: ${{ secrets.DT_KEY }}" \
            -H "Content-Type: application/json" \
            "https://public.doubletick.io/whatsapp/broadcastGroup/paginated?wabaNumber=%2B917738264158&limit=20" \
            -o dt_broadcasts_raw.json
          echo "Broadcasts fetched"
          cat dt_broadcasts_raw.json | head -c 200

      - name: Merge into single dt_data.json
        run: |
          python3 << 'PYEOF'
          import json, datetime

          try:
              with open('dt_chats_raw.json') as f:
                  chats = json.load(f)
          except:
              chats = {}

          try:
              with open('dt_broadcasts_raw.json') as f:
                  broadcasts = json.load(f)
          except:
              broadcasts = {}

          output = {
              "chats": chats,
              "broadcasts": broadcasts,
              "lastUpdated": datetime.datetime.utcnow().isoformat() + "Z"
          }

          with open('dt_data.json', 'w') as f:
              json.dump(output, f)

          print("dt_data.json created successfully")
          PYEOF

      - name: Commit and push dt_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dt_data.json
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: update DoubleTick data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
